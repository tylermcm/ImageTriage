name: Build Linux AppImage

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build-linux-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            packaging/linux-build-requirements.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python -m pip install -r packaging/linux-build-requirements.txt

      - name: Verify release tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        shell: python
        run: |
          import os
          import tomllib

          tag_version = os.environ["GITHUB_REF_NAME"].lstrip("v")
          with open("pyproject.toml", "rb") as handle:
              project_version = tomllib.load(handle)["project"]["version"]
          if tag_version != project_version:
              raise SystemExit(
                  f"Tag v{tag_version} does not match pyproject version {project_version}."
              )

      - name: Run packaging smoke tests
        run: |
          python -m unittest \
            tests.test_ai_model \
            tests.test_ai_workflow \
            tests.test_dinov2_extractor \
            tests.test_freeze_support \
            tests.test_packaging_scripts

      - name: Compile packaging scripts
        run: |
          python -m compileall \
            freeze_support.py \
            setup_linux.py \
            setup_msi.py \
            packaging/ai_python_runner.py \
            packaging/ai_runtime_installer.py \
            packaging/image_triage_cleanup.py

      - name: Build AppImage
        run: python setup_linux.py bdist_appimage

      - name: List build output
        run: ls -lah dist

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-triage-appimage-${{ github.sha }}
          path: dist/*.AppImage
          if-no-files-found: error
          retention-days: 14

      - name: Upload AppImage to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "Image Triage $GITHUB_REF_NAME" \
              --notes "Automated release for $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/*.AppImage --clobber
